<div class="space-y-6 animate-fade-in">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold text-gray-900">Centres d'Examen</h1>
    <button class="btn-primary">
      <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Nouveau centre
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div *ngFor="let center of centers()" class="card">
      <div class="flex items-start justify-between">
        <div>
          <h3 class="text-lg font-bold text-gray-900 mb-2">{{ center.name }}</h3>
          <p class="text-sm text-gray-600 mb-2">{{ center.address }}</p>
          <p class="text-sm text-gray-500">{{ center.phone }}</p>
        </div>
        <div class="text-right">
          <p class="text-2xl font-bold text-primary-600">{{ center.capacity }}</p>
          <p class="text-xs text-gray-500">places</p>
        </div>
      </div>
    </div>
  </div>
</div>
