<div class="space-y-6 animate-fade-in">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold text-gray-900">Gestion des Écoles</h1>
    <button class="btn-primary">
      <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Nouvelle école
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let school of schools()" class="card hover:scale-105 transform transition-all">
      <h3 class="text-lg font-bold text-gray-900 mb-2">{{ school.name }}</h3>
      <p class="text-sm text-gray-600 mb-4">{{ school.address }}</p>
      <div class="flex items-center justify-between text-sm">
        <span class="text-gray-500">{{ school.phone }}</span>
        <span class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs">Actif</span>
      </div>
    </div>
  </div>
</div>
