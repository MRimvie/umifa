<div *ngIf="open" class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/40" (click)="close()"></div>

  <div class="absolute inset-x-0 bottom-0">
    <div class="bg-white rounded-t-2xl shadow-2xl max-h-[85vh] flex flex-col">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="text-base font-semibold text-gray-900 truncate">{{ title }}</div>
        <button type="button" class="p-2 rounded-lg hover:bg-gray-100" (click)="close()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="p-4 overflow-auto">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</div>
