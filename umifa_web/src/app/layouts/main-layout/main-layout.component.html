<div class="min-h-screen bg-gray-50">
  <div class="hidden lg:block">
    <app-sidebar></app-sidebar>
  </div>

  <div
    class="fixed inset-0 z-40 lg:hidden"
    *ngIf="mobileSidebarOpen()">
    <div class="absolute inset-0 bg-black/40" (click)="closeMobileSidebar()"></div>
    <div class="absolute inset-y-0 left-0">
      <app-sidebar></app-sidebar>
    </div>
  </div>

  <header class="sticky top-0 z-30 bg-white border-b border-gray-200 lg:hidden">
    <div class="px-4 py-3 flex items-center justify-between">
      <button
        type="button"
        class="p-2 rounded-lg hover:bg-gray-100"
        (click)="openMobileSidebar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <div class="font-bold text-gray-900">UMIFA</div>

      <div class="w-10"></div>
    </div>
  </header>

  <main class="transition-all duration-300 lg:ml-64">
    <div class="p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
